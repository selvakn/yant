{{define "content"}}
{{$u := .User}}
<div class="user-actions__inner" id="user-actions-inner">
  <div class="user-actions__row">
    {{if not $u.Disabled}}
    <button type="button" class="button-secondary"
            hx-post="/admin/users/{{$u.Username}}/disable"
            hx-target="#user-actions-inner" hx-swap="outerHTML">Disable</button>
    {{else}}
    <button type="button" class="button-secondary"
            hx-post="/admin/users/{{$u.Username}}/enable"
            hx-target="#user-actions-inner" hx-swap="outerHTML">Enable</button>
    {{end}}
    {{if not $u.IsAdmin}}
    <button type="button" class="button-secondary"
            hx-post="/admin/users/{{$u.Username}}/promote"
            hx-target="#user-actions-inner" hx-swap="outerHTML">Promote admin</button>
    {{else}}
    <button type="button" class="button-secondary"
            hx-post="/admin/users/{{$u.Username}}/demote"
            hx-target="#user-actions-inner" hx-swap="outerHTML"
            {{if .OnlyUserAdmin}}disabled title="Cannot demote the only admin"{{end}}>Demote</button>
    {{end}}
    <a class="button-secondary" href="/admin/users/{{$u.Username}}/delete-confirm">Delete user</a>
  </div>
</div>
{{end}}
