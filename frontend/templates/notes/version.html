{{define "content"}}
<div class="reader-topbar">
  <a href="/notes/{{.Note.Slug}}/history" class="topbar-back">← History</a>
  <div class="topbar-actions">
    <a href="/notes/{{.Note.Slug}}" class="topbar-edit" title="View current version">Current version</a>
  </div>
</div>

{{if .IsHistorical}}
<div class="version-banner">
  Viewing version from
  <time class="note-date" datetime="{{.Version.Timestamp.Format "2006-01-02T15:04:05Z"}}">
    {{.Version.Timestamp.Format "Jan 2, 2006 at 3:04 PM"}}
  </time>
  <span class="version-hash">({{.Version.ShortHash}})</span>
  <button class="btn-revert-inline"
          hx-post="/notes/{{.Note.Slug}}/history/{{.Version.CommitHash}}/revert"
          hx-confirm="Revert this note to this version?"
          hx-swap="none">Revert to this version</button>
</div>
{{end}}

<article class="reader-content">
  <h1>{{.Note.Title}}</h1>
  <div class="markdown-body">
    {{.BodyHTML}}
  </div>
</article>

<script>
(function() {
  var slug = '{{.Note.Slug}}';
  var commit = '{{.Version.CommitHash}}';
  var tldrawLicenseKey = '{{.TldrawLicenseKey}}';
  var embeds = document.querySelectorAll('.drawing-embed');

  {{if .HasLegacyDrawing}}
  var legacyType = '{{.LegacyDrawingType}}';
  var legacyDiv = document.createElement('div');
  legacyDiv.className = 'drawing-preview-seamless';
  legacyDiv.id = 'drawing-preview-legacy';
  var mdBody = document.querySelector('.markdown-body');
  if (mdBody) mdBody.parentNode.insertBefore(legacyDiv, mdBody.nextSibling);

  function loadLegacyBundle(tool, cb) {
    var jsFile = '/static/vendor/' + tool + '-bundle.js';
    var cssFile = '/static/vendor/' + tool + '-bundle.css';
    if (document.querySelector('script[src="' + jsFile + '"]')) { cb(); return; }
    var link = document.createElement('link'); link.rel = 'stylesheet'; link.href = cssFile;
    document.head.appendChild(link);
    var s = document.createElement('script'); s.src = jsFile; s.onload = cb;
    document.head.appendChild(s);
  }
  loadLegacyBundle(legacyType, function() {
    var initFn = legacyType === 'excalidraw' ? window.initExcalidrawIsland : window.initTldrawIsland;
    if (initFn) {
      var opts = { readOnly: true, initialTool: legacyType === 'tldraw' ? 'hand' : undefined };
      if (legacyType === 'tldraw' && tldrawLicenseKey) opts.licenseKey = tldrawLicenseKey;
      var base = '/notes/' + encodeURIComponent(slug) + '/history/' + encodeURIComponent(commit);
      initFn(legacyDiv, base + '/drawing', base + '/drawing', opts);
    }
  });
  {{end}}

  if (embeds.length === 0) return;

  var listURL = '/notes/' + encodeURIComponent(slug) + '/history/' + encodeURIComponent(commit) + '/drawings';
  fetch(listURL, { credentials: 'same-origin' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      var drawingMap = {};
      (data.drawings || []).forEach(function(d) { drawingMap[d.drawing_id] = d; });
      var loadedBundles = {};
      function loadBundle(tool, cb) {
        if (loadedBundles[tool]) { cb(); return; }
        var jsFile = '/static/vendor/' + tool + '-bundle.js';
        var cssFile = '/static/vendor/' + tool + '-bundle.css';
        if (document.querySelector('script[src="' + jsFile + '"]')) { loadedBundles[tool] = true; cb(); return; }
        var link = document.createElement('link'); link.rel = 'stylesheet'; link.href = cssFile;
        document.head.appendChild(link);
        var s = document.createElement('script'); s.src = jsFile; s.onload = function() { loadedBundles[tool] = true; cb(); };
        document.head.appendChild(s);
      }
      embeds.forEach(function(el) {
        var drawingID = el.getAttribute('data-drawing-id');
        var info = drawingMap[drawingID];
        if (!info) {
          el.className = 'drawing-embed drawing-embed-missing';
          el.innerHTML = '<p class="drawing-missing-msg">Drawing not found</p>';
          return;
        }
        var skipTitle = /^(Drawing\s+)?\d+$/.test(info.display_name.trim());
        if (!skipTitle) {
          var caption = document.createElement('p');
          caption.className = 'drawing-embed-title';
          caption.textContent = info.display_name;
          el.parentNode.insertBefore(caption, el.nextSibling);
        }
        el.className = 'drawing-embed drawing-preview-seamless';
        loadBundle(info.tool_type, function() {
          var initFn = info.tool_type === 'excalidraw' ? window.initExcalidrawIsland : window.initTldrawIsland;
          if (initFn) {
            var opts = { readOnly: true, initialTool: info.tool_type === 'tldraw' ? 'hand' : undefined };
            if (info.tool_type === 'tldraw' && tldrawLicenseKey) opts.licenseKey = tldrawLicenseKey;
            var url = '/notes/' + encodeURIComponent(slug) + '/history/' + encodeURIComponent(commit) + '/drawings/' + encodeURIComponent(drawingID);
            initFn(el, url, url, opts);
          }
        });
      });
    })
    .catch(function(err) { console.error('Failed to load drawings:', err); });
})();

document.addEventListener('DOMContentLoaded', function() {
  document.body.addEventListener('htmx:afterRequest', function(evt) {
    var redirect = evt.detail.xhr && evt.detail.xhr.getResponseHeader('HX-Redirect');
    if (redirect) window.location.href = redirect;
  });
});
</script>
{{end}}
