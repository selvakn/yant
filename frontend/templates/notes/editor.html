{{define "content"}}
<span id="save-status" class="save-status"></span>
<div class="editor-topbar">
  <a href="/notes/{{.Note.Slug}}" class="topbar-back">← Back</a>
  <div class="topbar-menu">
    <button type="button" class="topbar-menu-btn" aria-label="More actions" id="menu-toggle">⋯</button>
    <div class="topbar-dropdown" id="menu-dropdown">
      <button type="button"
              hx-put="/notes/{{.Note.Slug}}/archive"
              hx-swap="none">Archive</button>
      <button type="button" id="remove-drawing-menu-btn" style="display:none;">Remove drawing</button>
      <hr>
      <button type="button"
              class="danger"
              hx-post="/notes/{{.Note.Slug}}"
              hx-headers='{"X-HTTP-Method-Override": "DELETE"}'
              hx-confirm="Delete this note permanently?">Delete</button>
    </div>
  </div>
</div>

<input id="note-title" type="text" value="{{.Note.Title}}" class="note-title-input" placeholder="Note title…">

<div class="editor-tag-bar" aria-label="Note tags">
  <div id="tag-chips" class="tag-chips"></div>
  <div class="tag-add-wrap">
    <input type="text"
           id="tag-add-input"
           class="tag-add-input"
           placeholder="Add tag…"
           list="tag-suggestions"
           autocomplete="off"
           aria-label="Add tag" />
    <datalist id="tag-suggestions"></datalist>
  </div>
</div>

<textarea id="note-body" style="display:none;">{{.Body}}</textarea>
<div id="easymde-container"></div>

<div class="drawing-section-seamless">
  <div class="drawing-management">
    <div id="drawing-list" class="drawing-list"></div>
    <div id="add-drawing-form" class="add-drawing-form">
      <input type="text" id="add-drawing-name" class="add-drawing-name" placeholder="Drawing name…" autocomplete="off">
      <span class="add-drawing-tools">
        <button type="button" class="btn-add-drawing" data-tool="excalidraw">+ Excalidraw</button>
        <button type="button" class="btn-add-drawing" data-tool="tldraw">+ tldraw</button>
      </span>
    </div>
  </div>
  {{if .HasLegacyDrawing}}
  <div id="drawing-canvas-legacy" class="drawing-canvas"></div>
  {{end}}
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var TAG_PATTERN = /#([a-zA-Z0-9_-]+)/g;
  var VALID_NEW = /^[a-zA-Z0-9_-]+$/;
  var slug = '{{.Note.Slug}}';

  function parseTags(body) {
    var seen = {};
    var out = [];
    var m;
    var re = new RegExp(TAG_PATTERN.source, 'g');
    while ((m = re.exec(body)) !== null) {
      var t = m[1].toLowerCase();
      if (!seen[t]) { seen[t] = true; out.push(t); }
    }
    return out;
  }

  function escapeRegExp(s) { return s.replace(/[.*+?^${}()|[\]\\]/g, '\\$&'); }

  function removeTagFromBody(body, tag) {
    var re = new RegExp('#' + escapeRegExp(tag) + '(?![a-zA-Z0-9_-])', 'gi');
    return body.replace(re, '').replace(/[ \t]{2,}/g, ' ');
  }

  function addTagToBody(body, tag) {
    tag = tag.toLowerCase();
    if (parseTags(body).indexOf(tag) >= 0) return body;
    var sep = body.length && !/\s$/.test(body) ? ' ' : '';
    return body + sep + '#' + tag;
  }

  function debounce(fn, ms) {
    var t;
    return function() {
      var ctx = this, args = arguments;
      clearTimeout(t);
      t = setTimeout(function() { fn.apply(ctx, args); }, ms);
    };
  }

  var easyMDE = new EasyMDE({
    element: document.getElementById('note-body'),
    initialValue: document.getElementById('note-body').value,
    spellChecker: false,
    status: false,
    autofocus: true,
    autosave: { enabled: false },
    uploadImage: true,
    imageUploadFunction: function(file, onSuccess, onError) {
      var form = new FormData();
      form.append('image', file);
      fetch('/notes/' + slug + '/images', { method: 'POST', body: form })
        .then(function(res) {
          if (!res.ok) throw new Error('Upload failed: ' + res.status);
          return res.json();
        })
        .then(function(data) { onSuccess(data.url); })
        .catch(function(err) { onError(err.message); });
    },
  });

  // Tag chips
  var chipsEl = document.getElementById('tag-chips');
  var addInput = document.getElementById('tag-add-input');
  var suggestions = document.getElementById('tag-suggestions');
  var tagColorMap = {};

  function renderChips() {
    var body = easyMDE.value();
    var tags = parseTags(body);
    chipsEl.innerHTML = '';
    tags.forEach(function(tag) {
      var chip = document.createElement('span');
      var color = tagColorMap[tag];
      if (color) {
        chip.className = 'tag-chip tag-chip-colored';
        chip.style.backgroundColor = color;
      } else {
        chip.className = 'tag-chip';
      }
      chip.appendChild(document.createTextNode('#' + tag));
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'tag-chip-remove';
      btn.setAttribute('aria-label', 'Remove tag ' + tag);
      btn.textContent = '\u00d7';
      btn.addEventListener('click', function() {
        easyMDE.value(removeTagFromBody(easyMDE.value(), tag));
        renderChips();
      });
      chip.appendChild(btn);
      chipsEl.appendChild(chip);
    });
  }

  var renderChipsDebounced = debounce(renderChips, 150);
  easyMDE.codemirror.on('change', renderChipsDebounced);

  fetch('/tags', { credentials: 'same-origin' })
    .then(function(r) { return r.json(); })
    .then(function(list) {
      suggestions.innerHTML = '';
      (list || []).forEach(function(row) {
        var name = row.Name !== undefined ? row.Name : row.name;
        var color = row.Color !== undefined ? row.Color : row.color;
        if (!name) return;
        if (color) tagColorMap[name.toLowerCase()] = color;
        var opt = document.createElement('option');
        opt.value = name;
        suggestions.appendChild(opt);
      });
      renderChips();
    })
    .catch(function() {});

  addInput.addEventListener('keydown', function(e) {
    if (e.key !== 'Enter') return;
    e.preventDefault();
    var raw = addInput.value.trim().toLowerCase().replace(/^#+/, '');
    if (!raw || !VALID_NEW.test(raw)) return;
    easyMDE.value(addTagToBody(easyMDE.value(), raw));
    addInput.value = '';
    renderChips();
  });

  renderChips();

  // --- Note link autocomplete ([[) ---
  (function() {
    var cm = easyMDE.codemirror;
    var dropdown = null;
    var items = [];
    var selectedIdx = -1;
    var linkStart = null;

    function removeDropdown() {
      if (dropdown) { dropdown.remove(); dropdown = null; }
      items = [];
      selectedIdx = -1;
      linkStart = null;
    }

    function createDropdown(coords) {
      removeDropdown();
      dropdown = document.createElement('div');
      dropdown.className = 'note-autocomplete';
      dropdown.style.left = coords.left + 'px';
      dropdown.style.top = (coords.bottom + 2) + 'px';
      document.body.appendChild(dropdown);
    }

    function renderItems(results) {
      if (!dropdown) return;
      dropdown.innerHTML = '';
      items = [];
      selectedIdx = -1;
      if (results.length === 0) {
        var empty = document.createElement('div');
        empty.className = 'note-autocomplete-empty';
        empty.textContent = 'No matching notes';
        dropdown.appendChild(empty);
        return;
      }
      results.forEach(function(note, idx) {
        var el = document.createElement('div');
        el.className = 'note-autocomplete-item';
        el.textContent = note.Title;
        el.addEventListener('mousedown', function(e) {
          e.preventDefault();
          selectItem(idx);
        });
        dropdown.appendChild(el);
        items.push(el);
      });
    }

    function selectItem(idx) {
      if (idx < 0 || idx >= items.length || !linkStart) return;
      var title = items[idx].textContent;
      var cur = cm.getCursor();
      cm.replaceRange(title + ']]', linkStart, cur);
      removeDropdown();
    }

    function updateSelection(idx) {
      items.forEach(function(el) { el.classList.remove('selected'); });
      if (idx >= 0 && idx < items.length) {
        selectedIdx = idx;
        items[idx].classList.add('selected');
        items[idx].scrollIntoView({ block: 'nearest' });
      }
    }

    var fetchTimer = null;
    function fetchSuggestions(query) {
      clearTimeout(fetchTimer);
      fetchTimer = setTimeout(function() {
        fetch('/notes/autocomplete?q=' + encodeURIComponent(query), { credentials: 'same-origin' })
          .then(function(r) { return r.json(); })
          .then(function(data) {
            renderItems(data || []);
            if (items.length > 0) updateSelection(0);
          })
          .catch(function() {});
      }, 100);
    }

    cm.on('change', function(instance, change) {
      if (change.origin === 'setValue') return;
      var cur = cm.getCursor();
      var line = cm.getLine(cur.line);
      var textBefore = line.slice(0, cur.ch);

      var openIdx = textBefore.lastIndexOf('[[');
      if (openIdx === -1 || textBefore.indexOf(']]', openIdx) !== -1) {
        removeDropdown();
        return;
      }

      var query = textBefore.slice(openIdx + 2);
      linkStart = { line: cur.line, ch: openIdx + 2 };
      var coords = cm.cursorCoords(cur, 'page');
      if (!dropdown) createDropdown(coords);
      fetchSuggestions(query);
    });

    cm.on('keydown', function(instance, e) {
      if (!dropdown) return;
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        updateSelection(Math.min(selectedIdx + 1, items.length - 1));
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        updateSelection(Math.max(selectedIdx - 1, 0));
      } else if (e.key === 'Enter' || e.key === 'Tab') {
        if (selectedIdx >= 0) {
          e.preventDefault();
          selectItem(selectedIdx);
        }
      } else if (e.key === 'Escape') {
        removeDropdown();
      }
    });

    cm.on('blur', function() {
      setTimeout(removeDropdown, 150);
    });
  })();

  // --- @due date picker ---
  (function() {
    var cm = easyMDE.codemirror;
    var pickerEl = null;
    var dueStart = null;
    var dateInput = null;

    function closePicker() {
      if (pickerEl) { pickerEl.remove(); pickerEl = null; }
      dateInput = null;
      dueStart = null;
    }

    function insertDate(dateStr) {
      if (!dueStart) return;
      // Replace @due with @due(YYYY-MM-DD)
      var endPos = { line: dueStart.line, ch: dueStart.ch + 4 }; // end of "@due"
      cm.replaceRange('@due(' + dateStr + ')', dueStart, endPos);
      closePicker();
      cm.focus();
    }

    function openPicker() {
      closePicker();

      var cur = cm.getCursor();
      dueStart = { line: cur.line, ch: cur.ch - 4 };
      var coords = cm.cursorCoords(cur, 'page');

      pickerEl = document.createElement('div');
      pickerEl.className = 'due-date-picker';
      pickerEl.style.left = coords.left + 'px';
      pickerEl.style.top = (coords.bottom + 4) + 'px';

      // Prevent CodeMirror from stealing focus when clicking inside picker
      pickerEl.addEventListener('mousedown', function(e) {
        e.stopPropagation();
      });

      // Quick-select presets
      var quickBtns = document.createElement('div');
      quickBtns.className = 'due-date-quick';
      [
        ['Today', 0], ['Tomorrow', 1], ['+3d', 3], ['+1w', 7]
      ].forEach(function(p) {
        var btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'due-date-quick-btn';
        btn.textContent = p[0];
        btn.addEventListener('click', function() {
          var d = new Date();
          d.setDate(d.getDate() + p[1]);
          insertDate(d.toISOString().slice(0, 10));
        });
        quickBtns.appendChild(btn);
      });
      pickerEl.appendChild(quickBtns);

      // Manual date input
      dateInput = document.createElement('input');
      dateInput.type = 'date';
      dateInput.className = 'due-date-input';
      dateInput.placeholder = 'YYYY-MM-DD';
      var tomorrow = new Date();
      tomorrow.setDate(tomorrow.getDate() + 1);
      dateInput.value = tomorrow.toISOString().slice(0, 10);

      dateInput.addEventListener('keydown', function(e) {
        e.stopPropagation();
        if (e.key === 'Enter') {
          e.preventDefault();
          var val = dateInput.value.trim();
          if (/^\d{4}-\d{2}-\d{2}$/.test(val)) insertDate(val);
        }
        if (e.key === 'Escape') {
          e.preventDefault();
          closePicker();
          cm.focus();
        }
      });
      pickerEl.appendChild(dateInput);

      document.body.appendChild(pickerEl);
      dateInput.focus();
      dateInput.select();
    }

    // Detect "@due" typed in editor
    cm.on('inputRead', function(instance, change) {
      if (pickerEl) return;
      var cur = cm.getCursor();
      var line = cm.getLine(cur.line);
      var textBefore = line.slice(0, cur.ch);
      if (textBefore.endsWith('@due')) {
        openPicker();
      }
    });

    // Escape closes picker from editor too
    cm.on('keydown', function(instance, e) {
      if (!pickerEl) return;
      if (e.key === 'Escape') {
        e.preventDefault();
        closePicker();
      }
    });

    // Close when clicking outside the picker
    document.addEventListener('click', function(e) {
      if (pickerEl && !pickerEl.contains(e.target)) {
        closePicker();
      }
    });
  })();

  // --- Auto-save ---
  var saveStatusEl = document.getElementById('save-status');
  var lastSavedTitle = document.getElementById('note-title').value;
  var lastSavedBody = easyMDE.value();
  var isSaving = false;
  var fadeTimer = null;

  function showStatus(text, type) {
    clearTimeout(fadeTimer);
    saveStatusEl.textContent = text;
    saveStatusEl.className = 'save-status' + (type ? ' save-status--' + type : '');
    if (type === 'saved') {
      fadeTimer = setTimeout(function() {
        if (saveStatusEl.className.indexOf('saved') !== -1) {
          saveStatusEl.textContent = '';
          saveStatusEl.className = 'save-status';
        }
      }, 2500);
    }
  }

  function hasUnsavedChanges() {
    return document.getElementById('note-title').value !== lastSavedTitle ||
           easyMDE.value() !== lastSavedBody;
  }

  function doSave(onSuccess) {
    var title = document.getElementById('note-title').value;
    var body = easyMDE.value();
    if (title === lastSavedTitle && body === lastSavedBody) {
      if (onSuccess) onSuccess();
      return;
    }
    if (isSaving) { setTimeout(function() { doSave(onSuccess); }, 500); return; }

    isSaving = true;
    showStatus('Saving\u2026', 'saving');

    var formData = new FormData();
    formData.append('title', title);
    formData.append('body', body);

    fetch('/notes/' + slug, {
      method: 'POST',
      credentials: 'same-origin',
      headers: { 'X-HTTP-Method-Override': 'PUT' },
      body: formData,
    })
    .then(function(res) {
      if (!res.ok) throw new Error('Save failed');
      lastSavedTitle = title;
      lastSavedBody = body;
      showStatus('Saved', 'saved');
      if (onSuccess) onSuccess();
    })
    .catch(function() {
      showStatus('Save failed', 'error');
    })
    .then(function() {
      isSaving = false;
    });
  }

  // Auto-save every 60 seconds if there are unsaved changes.
  var AUTO_SAVE_INTERVAL_MS = 60000;
  setInterval(function() {
    if (hasUnsavedChanges()) doSave();
  }, AUTO_SAVE_INTERVAL_MS);

  document.addEventListener('keydown', function(e) {
    if ((e.ctrlKey || e.metaKey) && e.key === 's') {
      e.preventDefault();
      doSave();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
      e.preventDefault();
      doSave(function() { window.location.href = '/notes/' + slug; });
    }
  });

  window.addEventListener('beforeunload', function(e) {
    if (hasUnsavedChanges()) {
      // Attempt background save
      var formData = new FormData();
      formData.append('title', document.getElementById('note-title').value);
      formData.append('body', easyMDE.value());
      navigator.sendBeacon('/notes/' + slug, formData);
      // Prompt the user before leaving
      e.preventDefault();
      e.returnValue = '';
    }
  });

  // htmx redirect handling (archive/delete)
  document.body.addEventListener('htmx:afterRequest', function(evt) {
    var redirect = evt.detail.xhr && evt.detail.xhr.getResponseHeader('HX-Redirect');
    if (redirect) window.location.href = redirect;
  });

  // --- Dropdown menu ---
  var menuToggle = document.getElementById('menu-toggle');
  var menuDropdown = document.getElementById('menu-dropdown');
  menuToggle.addEventListener('click', function(e) {
    e.stopPropagation();
    menuDropdown.classList.toggle('open');
  });
  document.addEventListener('click', function() {
    menuDropdown.classList.remove('open');
  });

  // --- Multi-Drawing (preview cards) ---
  var drawingList = document.getElementById('drawing-list');
  var addDrawingNameInput = document.getElementById('add-drawing-name');
  var addDrawingBtns = document.querySelectorAll('.btn-add-drawing');
  var removeDrawingBtn = document.getElementById('remove-drawing-menu-btn');
  var drawingCleanup = null;
  var activeDrawingID = null;
  var loadedBundles = {};
  var tldrawLicenseKey = '{{.TldrawLicenseKey}}';

  function loadBundle(tool, cb) {
    if (loadedBundles[tool]) { cb(); return; }
    var jsBase = '/static/vendor/' + tool + '-bundle.js';
    var cssBase = '/static/vendor/' + tool + '-bundle.css';
    if (document.querySelector('script[src^="' + jsBase + '"]')) { loadedBundles[tool] = true; cb(); return; }
    var link = document.createElement('link'); link.rel = 'stylesheet'; link.href = cssBase;
    document.head.appendChild(link);
    var s = document.createElement('script'); s.src = jsBase; s.onload = function() { loadedBundles[tool] = true; cb(); };
    document.head.appendChild(s);
  }

  function escapeHTML(s) {
    var div = document.createElement('div');
    div.appendChild(document.createTextNode(s));
    return div.innerHTML;
  }

  function loadPreviewSVG(card, drawingID, bustCache) {
    var body = card.querySelector('.drawing-preview-body');
    if (!body) return;
    body.innerHTML = '<div class="drawing-preview-placeholder">Loading…</div>';
    var url = '/notes/' + slug + '/drawings/' + drawingID + '/svg';
    if (bustCache) url += '?t=' + Date.now();
    fetch(url, { credentials: 'same-origin', cache: 'no-store' })
      .then(function(r) {
        if (r.status === 404) return null;
        if (!r.ok) throw new Error('svg fetch failed');
        return r.text();
      })
      .then(function(svgText) {
        // If the user opened the canvas while the SVG was loading, don't clobber it.
        if (card.classList.contains('editing') || !card.isConnected) return;
        if (!svgText || svgText.trim() === '') {
          body.innerHTML = '<div class="drawing-preview-placeholder">Empty drawing — click to draw</div>';
          return;
        }
        var wrap = document.createElement('div');
        wrap.className = 'drawing-svg-preview';
        wrap.innerHTML = svgText;
        body.innerHTML = '';
        body.appendChild(wrap);
      })
      .catch(function() {
        if (card.classList.contains('editing') || !card.isConnected) return;
        body.innerHTML = '<div class="drawing-preview-placeholder">Preview unavailable — click to edit</div>';
      });
  }

  function closeDrawingCanvas() {
    if (!activeDrawingID) {
      // Legacy / no-card cleanup path
      if (drawingCleanup) { drawingCleanup(); drawingCleanup = null; }
      return;
    }
    var card = drawingList.querySelector('.drawing-preview-card[data-drawing-id="' + activeDrawingID + '"]');
    var idToRefresh = activeDrawingID;
    if (drawingCleanup) { drawingCleanup(); drawingCleanup = null; }
    activeDrawingID = null;
    if (card) {
      card.classList.remove('editing');
      card.classList.add('previewable');
      var closeBtn = card.querySelector('.drawing-canvas-close');
      if (closeBtn) closeBtn.remove();
      var body = card.querySelector('.drawing-preview-body');
      if (body) body.innerHTML = '<div class="drawing-preview-placeholder">Loading…</div>';

      // Two paths converge to the refetch:
      //   - The bundle's flush-on-unmount fires a `yant:drawing-saved` event
      //     when the SVG PUT finishes; we refetch as soon as that lands.
      //   - As a fallback (no edits made, or save flow errored), refetch
      //     after a short delay so the preview always settles.
      var refreshed = false;
      function doRefresh() {
        if (refreshed) return;
        refreshed = true;
        window.removeEventListener('yant:drawing-saved', onSaved);
        clearTimeout(fallbackTimer);
        loadPreviewSVG(card, idToRefresh, true);
      }
      function onSaved(e) {
        if (e && e.detail && e.detail.drawingID === idToRefresh) doRefresh();
      }
      window.addEventListener('yant:drawing-saved', onSaved);
      var fallbackTimer = setTimeout(doRefresh, 800);
    }
  }

  function openDrawingCanvas(drawingID, toolType, card) {
    closeDrawingCanvas();
    if (!card) return;
    activeDrawingID = drawingID;
    card.classList.add('editing');
    card.classList.remove('previewable');

    var body = card.querySelector('.drawing-preview-body');
    body.innerHTML = '';
    var canvas = document.createElement('div');
    canvas.className = 'drawing-canvas';
    body.appendChild(canvas);

    var closeBtn = document.createElement('button');
    closeBtn.type = 'button';
    closeBtn.className = 'drawing-canvas-close';
    closeBtn.textContent = 'Done';
    closeBtn.addEventListener('click', function(e) {
      e.stopPropagation();
      closeDrawingCanvas();
    });
    card.appendChild(closeBtn);

    loadBundle(toolType, function() {
      var initFn = toolType === 'excalidraw' ? window.initExcalidrawIsland : window.initTldrawIsland;
      if (initFn) {
        var loadUrl = '/notes/' + slug + '/drawings/' + drawingID;
        var saveUrl = loadUrl;
        var opts = { initialTool: toolType === 'tldraw' ? 'draw' : undefined };
        if (toolType === 'tldraw' && tldrawLicenseKey) opts.licenseKey = tldrawLicenseKey;
        drawingCleanup = initFn(canvas, loadUrl, saveUrl, opts);
      }
    });
    card.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
  }

  function appendOrphanedMarkers(drawings) {
    var cm = easyMDE.codemirror;
    var body = cm.getValue();
    var appended = [];
    (drawings || []).forEach(function(d) {
      if (!d.has_marker) {
        var marker = '![[draw:' + d.drawing_id + ']]';
        if (body.indexOf(marker) === -1) {
          appended.push(marker);
        }
      }
    });
    if (appended.length > 0) {
      var suffix = '\n' + appended.join('\n') + '\n';
      var lastLine = cm.lastLine();
      var lastLineContent = cm.getLine(lastLine);
      cm.replaceRange(suffix, { line: lastLine, ch: lastLineContent.length });
    }
  }

  function buildPreviewCard(d) {
    var card = document.createElement('div');
    card.className = 'drawing-preview-card previewable';
    card.setAttribute('data-drawing-id', d.drawing_id);
    card.setAttribute('data-tool-type', d.tool_type);

    var header = document.createElement('div');
    header.className = 'drawing-preview-header';

    var name = document.createElement('span');
    name.className = 'drawing-preview-name';
    name.textContent = d.display_name;
    header.appendChild(name);

    var tool = document.createElement('span');
    tool.className = 'drawing-preview-tool';
    tool.textContent = d.tool_type;
    header.appendChild(tool);

    var rename = document.createElement('button');
    rename.type = 'button';
    rename.className = 'drawing-preview-rename';
    rename.title = 'Rename drawing';
    rename.textContent = '✏'; // pencil
    header.appendChild(rename);

    var del = document.createElement('button');
    del.type = 'button';
    del.className = 'drawing-preview-delete';
    del.textContent = 'Delete';
    header.appendChild(del);

    card.appendChild(header);

    var body = document.createElement('div');
    body.className = 'drawing-preview-body';
    card.appendChild(body);

    return card;
  }

  function refreshDrawingList(thenOpenID, thenOpenTool) {
    fetch('/notes/' + slug + '/drawings', { credentials: 'same-origin' })
      .then(function(r) { return r.json(); })
      .then(function(data) {
        var openID = thenOpenID || activeDrawingID;
        var openTool = thenOpenTool;
        if (drawingCleanup) { drawingCleanup(); drawingCleanup = null; }
        activeDrawingID = null;
        drawingList.innerHTML = '';

        var drawings = (data.drawings || []).slice();
        var bodyText = easyMDE.codemirror.getValue();
        drawings.sort(function(a, b) {
          var ai = bodyText.indexOf('![[draw:' + a.drawing_id + ']]');
          var bi = bodyText.indexOf('![[draw:' + b.drawing_id + ']]');
          if (ai === -1 && bi === -1) return 0;
          if (ai === -1) return 1;
          if (bi === -1) return -1;
          return ai - bi;
        });

        drawings.forEach(function(d) {
          var card = buildPreviewCard(d);
          drawingList.appendChild(card);
          loadPreviewSVG(card, d.drawing_id);
        });

        if (openID) {
          var card = drawingList.querySelector('[data-drawing-id="' + openID + '"]');
          if (card) {
            var tool = openTool || card.getAttribute('data-tool-type');
            openDrawingCanvas(openID, tool, card);
          }
        }
      });
  }

  function startRename(card) {
    var nameSpan = card.querySelector('.drawing-preview-name');
    if (!nameSpan || nameSpan.querySelector('input')) return;
    var current = nameSpan.textContent;
    var drawingID = card.getAttribute('data-drawing-id');

    var input = document.createElement('input');
    input.type = 'text';
    input.className = 'drawing-preview-name-input';
    input.value = current;
    input.maxLength = 100;
    var done = false;

    function finish(value) {
      if (done) return;
      done = true;
      nameSpan.innerHTML = '';
      nameSpan.textContent = value;
    }
    function commit() {
      if (done) return;
      var v = input.value.trim();
      if (!v || v === current) { finish(current); return; }
      fetch('/notes/' + slug + '/drawings/' + drawingID, {
        method: 'PATCH', credentials: 'same-origin',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ display_name: v })
      })
        .then(function(r) { return r.json().then(function(j) { return { ok: r.ok, body: j }; }); })
        .then(function(res) {
          if (res.ok && res.body && res.body.ok) {
            finish(v);
          } else {
            if (res.body && res.body.error) alert(res.body.error);
            finish(current);
          }
        })
        .catch(function() { finish(current); });
    }
    function cancel() { finish(current); }

    input.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') { e.preventDefault(); commit(); }
      else if (e.key === 'Escape') { e.preventDefault(); cancel(); }
    });
    input.addEventListener('blur', commit);

    nameSpan.innerHTML = '';
    nameSpan.appendChild(input);
    input.focus();
    input.select();
  }

  function createDrawing(toolType) {
    var name = addDrawingNameInput.value.trim();
    if (!name) name = 'Drawing ' + (drawingList.children.length + 1);

    fetch('/notes/' + slug + '/drawings', {
      method: 'POST', credentials: 'same-origin',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ display_name: name, tool_type: toolType })
    })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      if (data.error) { alert(data.error); return; }
      addDrawingNameInput.value = '';
      var cm = easyMDE.codemirror;
      var cursor = cm.getCursor();
      cm.replaceRange('\n' + data.marker + '\n', cursor);
      refreshDrawingList(data.drawing_id, toolType);
    });
  }

  addDrawingBtns.forEach(function(btn) {
    btn.addEventListener('click', function() {
      createDrawing(btn.getAttribute('data-tool'));
    });
  });

  addDrawingNameInput.addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      e.preventDefault();
      createDrawing('excalidraw');
    }
  });

  drawingList.addEventListener('click', function(e) {
    var card = e.target.closest('.drawing-preview-card');
    if (!card) return;
    var drawingID = card.getAttribute('data-drawing-id');

    if (e.target.closest('.drawing-preview-rename')) {
      e.stopPropagation();
      startRename(card);
      return;
    }

    if (e.target.closest('.drawing-preview-delete')) {
      e.stopPropagation();
      if (!confirm('Delete this drawing?')) return;
      fetch('/notes/' + slug + '/drawings/' + drawingID, { method: 'DELETE', credentials: 'same-origin' })
        .then(function(r) {
          if (r.ok) {
            if (activeDrawingID === drawingID) {
              if (drawingCleanup) { drawingCleanup(); drawingCleanup = null; }
              activeDrawingID = null;
            }
            refreshDrawingList();
          }
        });
      return;
    }

    if (e.target.closest('.drawing-canvas-close')) {
      // Handled by the button's own listener; skip card-click logic.
      return;
    }

    if (card.classList.contains('editing')) {
      // Clicks inside the live canvas area should not re-trigger open.
      return;
    }

    if (e.target.closest('.drawing-preview-body') || e.target.closest('.drawing-preview-placeholder')) {
      var tool = card.getAttribute('data-tool-type');
      openDrawingCanvas(drawingID, tool, card);
    }
  });

  fetch('/notes/' + slug + '/drawings', { credentials: 'same-origin' })
    .then(function(r) { return r.json(); })
    .then(function(data) {
      appendOrphanedMarkers(data.drawings);
      refreshDrawingList();
    });

  {{if .HasLegacyDrawing}}
  (function() {
    var legacyCanvas = document.getElementById('drawing-canvas-legacy');
    var legacyType = '{{.LegacyDrawingType}}';
    if (!legacyCanvas) return;
    loadBundle(legacyType, function() {
      var initFn = legacyType === 'excalidraw' ? window.initExcalidrawIsland : window.initTldrawIsland;
      if (initFn) {
        var opts = { initialTool: legacyType === 'tldraw' ? 'draw' : undefined };
        if (legacyType === 'tldraw' && tldrawLicenseKey) opts.licenseKey = tldrawLicenseKey;
        drawingCleanup = initFn(legacyCanvas, '/notes/' + slug + '/drawing', '/notes/' + slug + '/drawing?type=' + legacyType, opts);
      }
    });
  })();
  {{end}}

  if (removeDrawingBtn) {
    removeDrawingBtn.addEventListener('click', function() {
      menuDropdown.classList.remove('open');
      closeDrawingCanvas();
    });
  }
});
</script>
{{end}}
