{{define "content"}}
<div class="notes-header">
  <h1>Notes{{if .ActiveTag}} — #{{.ActiveTag}}{{end}}</h1>
  <form method="POST" action="/notes" class="new-note-form">
    <input name="title" type="text" placeholder="New note title…">
    <button type="submit">+ New Note</button>
  </form>
</div>

<div class="search-box">
  <input type="text" 
         id="search-input"
         name="q" 
         placeholder="Search notes…" 
         autocomplete="off"
         hx-get="/notes/search" 
         hx-trigger="keyup changed delay:250ms, search"
         hx-target="#note-list"
         hx-swap="innerHTML">
</div>

<ul id="note-list" class="note-list">
  {{range .Notes}}
  <li class="note-item" data-href="/notes/{{.Slug}}">
    <div class="note-content">
      <a href="/notes/{{.Slug}}" class="note-title">{{.Title}}</a>
      <div class="note-meta">
        {{range .Tags}}<a href="/notes?tag={{.}}" class="tag">#{{.}}</a> {{end}}
        <span class="note-date">{{.UpdatedAt.Format "Jan 2, 2006 at 3:04 PM"}}</span>
      </div>
    </div>
    <button class="btn-archive" 
            hx-put="/notes/{{.Slug}}/archive" 
            hx-swap="none"
            title="Archive note">Archive</button>
  </li>
  {{else}}
  <li class="note-empty">No notes yet. Create your first note above.</li>
  {{end}}
</ul>

<script>
(function() {
  var searchInput = document.getElementById('search-input');
  var noteList = document.getElementById('note-list');
  var selectedIndex = -1;

  function getItems() {
    return noteList.querySelectorAll('.note-item[data-href]');
  }

  function updateSelection(newIndex) {
    var items = getItems();
    if (items.length === 0) return;

    items.forEach(function(item) {
      item.classList.remove('selected');
    });

    if (newIndex < 0) newIndex = 0;
    if (newIndex >= items.length) newIndex = items.length - 1;

    selectedIndex = newIndex;
    items[selectedIndex].classList.add('selected');
    items[selectedIndex].scrollIntoView({ block: 'nearest' });
  }

  searchInput.addEventListener('keydown', function(e) {
    var items = getItems();
    
    if (e.key === 'ArrowDown') {
      e.preventDefault();
      updateSelection(selectedIndex + 1);
    } else if (e.key === 'ArrowUp') {
      e.preventDefault();
      updateSelection(selectedIndex - 1);
    } else if (e.key === 'Enter') {
      e.preventDefault();
      if (selectedIndex >= 0 && selectedIndex < items.length) {
        window.location.href = items[selectedIndex].dataset.href;
      } else if (items.length > 0) {
        window.location.href = items[0].dataset.href;
      }
    } else if (e.key === 'Escape') {
      searchInput.value = '';
      selectedIndex = -1;
      htmx.trigger(searchInput, 'search');
    }
  });

  document.body.addEventListener('htmx:afterSwap', function(e) {
    if (e.detail.target === noteList) {
      selectedIndex = -1;
      var items = getItems();
      if (items.length > 0 && searchInput.value.trim() !== '') {
        updateSelection(0);
      }
    }
  });
})();
</script>
{{end}}
