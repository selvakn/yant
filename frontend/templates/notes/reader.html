{{define "content"}}
{{if .HasDrawing}}
<link rel="stylesheet" href="/static/vendor/tldraw-bundle.css">
<script src="/static/vendor/tldraw-bundle.js"></script>
{{end}}

<div class="reader-topbar">
  <a href="/notes" class="topbar-back">← Notes</a>
  <span class="note-date">{{.Note.UpdatedAt.Format "Jan 2, 2006 15:04"}}</span>
  <div class="topbar-actions">
    <button class="btn-archive"
            hx-put="/notes/{{.Note.Slug}}/archive"
            hx-swap="none"
            title="Archive note">Archive</button>
    <button class="btn-delete"
            hx-post="/notes/{{.Note.Slug}}"
            hx-headers='{"X-HTTP-Method-Override": "DELETE"}'
            hx-confirm="Delete this note permanently?"
            hx-swap="none"
            title="Delete note">Delete</button>
    <a href="/notes/{{.Note.Slug}}/edit" class="topbar-edit">Edit</a>
  </div>
</div>

<article class="reader-content">
  <h1>{{.Note.Title}}</h1>
  {{if .Note.Tags}}
  <div class="reader-tags">
    {{range .Note.Tags}}<a href="/notes?tag={{.}}" class="tag">#{{.}}</a> {{end}}
  </div>
  {{end}}

  <div class="markdown-body">
    {{.BodyHTML}}
  </div>
</article>

{{if .HasDrawing}}
<div id="drawing-preview" class="drawing-preview-seamless"></div>
{{end}}

<script>
document.addEventListener('DOMContentLoaded', function() {
  {{if .HasDrawing}}
  var previewEl = document.getElementById('drawing-preview');
  var slug = '{{.Note.Slug}}';
  if (window.initTldrawIsland && previewEl) {
    window.initTldrawIsland(previewEl, '/notes/' + slug + '/drawing', '/notes/' + slug + '/drawing', {
      readOnly: true,
      initialTool: 'hand'
    });
  }
  {{end}}

  document.body.addEventListener('htmx:afterRequest', function(evt) {
    var redirect = evt.detail.xhr && evt.detail.xhr.getResponseHeader('HX-Redirect');
    if (redirect) window.location.href = redirect;
  });
});
</script>
{{end}}
