{{define "content"}}
{{if .HasDrawing}}
<link rel="stylesheet" href="/static/vendor/tldraw-bundle.css">
<script src="/static/vendor/tldraw-bundle.js"></script>
{{end}}

<div class="reader-header">
  <h1>{{.Note.Title}}</h1>
  <div class="reader-meta">
    {{range .Note.Tags}}<a href="/notes?tag={{.}}" class="tag">#{{.}}</a> {{end}}
    <span class="note-date">Updated {{.Note.UpdatedAt.Format "Jan 2, 2006 15:04"}}</span>
    <a href="/notes/{{.Note.Slug}}/edit" class="btn btn-secondary">Edit</a>
    <button class="btn btn-secondary" 
            hx-put="/notes/{{.Note.Slug}}/archive" 
            hx-swap="none"
            title="Archive note">Archive</button>
  </div>
</div>

<article class="note-body markdown-body">
  {{.BodyHTML}}
</article>

{{if .HasDrawing}}
<div class="drawing-section drawing-reader">
  <div class="drawing-header">
    <span class="drawing-label">Drawing</span>
    <a href="/notes/{{.Note.Slug}}/edit" class="btn btn-secondary btn-sm">Edit Drawing</a>
  </div>
  <div id="drawing-preview" class="drawing-preview"></div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var previewEl = document.getElementById('drawing-preview');
  var slug = '{{.Note.Slug}}';
  if (window.initTldrawIsland && previewEl) {
    window.initTldrawIsland(previewEl, '/notes/' + slug + '/drawing', '/notes/' + slug + '/drawing', {
      readOnly: true
    });
  }
});
</script>
{{end}}
{{end}}
