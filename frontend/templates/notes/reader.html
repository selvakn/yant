{{define "content"}}
{{if .HasDrawing}}
<link rel="stylesheet" href="/static/vendor/tldraw-bundle.css">
<script src="/static/vendor/tldraw-bundle.js"></script>
{{end}}

<div class="reader-topbar">
  <a href="/notes" class="topbar-back">← Notes</a>
  <span class="note-date">{{.Note.UpdatedAt.Format "Jan 2, 2006 15:04"}}</span>
  <a href="/notes/{{.Note.Slug}}/edit" class="topbar-edit">Edit</a>
</div>

<article class="reader-content">
  <h1>{{.Note.Title}}</h1>
  {{if .Note.Tags}}
  <div class="reader-tags">
    {{range .Note.Tags}}<a href="/notes?tag={{.}}" class="tag">#{{.}}</a> {{end}}
  </div>
  {{end}}

  <div class="markdown-body">
    {{.BodyHTML}}
  </div>
</article>

{{if .HasDrawing}}
<div id="drawing-preview" class="drawing-preview-seamless"></div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var previewEl = document.getElementById('drawing-preview');
  var slug = '{{.Note.Slug}}';
  if (window.initTldrawIsland && previewEl) {
    window.initTldrawIsland(previewEl, '/notes/' + slug + '/drawing', '/notes/' + slug + '/drawing', {
      readOnly: true
    });
  }
});
</script>
{{end}}
{{end}}
