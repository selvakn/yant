{{define "content"}}
<div class="sidebar-tags">
  <nav class="sidebar-nav">
    <a href="/notes" class="sidebar-nav-link" data-path="/notes">All notes</a>
    <a href="/todos" class="sidebar-nav-link" data-path="/todos">Todos{{if .TodoCount}} <span class="todo-count-badge">{{.TodoCount}}</span>{{end}}</a>
    <a href="/archive" class="sidebar-nav-link" data-path="/archive">Archive</a>
  </nav>
  {{if .Tags}}
  <h3>Tags</h3>
  <ul class="tag-list">
    {{range .Tags}}
    <li>
      <a href="/notes?tag={{.Name}}" class="tag tag-colored" style="background-color: {{.Color}};" data-tag="{{.Name}}" data-color="{{.Color}}" data-server-colored="true">
        #{{.Name}} <span class="tag-count">{{.Count}}</span>
      </a>
    </li>
    {{end}}
  </ul>
  {{end}}
  <div class="sidebar-footer">
    <button type="button" class="sidebar-help-btn" id="show-shortcuts" title="Keyboard shortcuts (?)">Shortcuts <kbd>?</kbd></button>
  </div>
</div>
{{end}}
