{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Notes</title>
  <link rel="stylesheet" href="/static/vendor/easymde.min.css">
  <link rel="stylesheet" href="/static/css/app.css">
  <script src="/static/vendor/htmx.min.js" defer></script>
  <script src="/static/vendor/easymde.min.js" defer></script>
  <script src="/static/js/app.js" defer></script>
</head>
<body>
  {{if .Username}}
  <nav class="site-nav">
    <button type="button" class="nav-sidebar-toggle" id="sidebar-toggle" aria-label="Browse tags" title="Browse tags (t)">
      <svg width="18" height="18" viewBox="0 0 18 18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="2" y1="4" x2="16" y2="4"/><line x1="2" y1="9" x2="16" y2="9"/><line x1="2" y1="14" x2="16" y2="14"/></svg>
    </button>
    <a href="/notes" class="nav-brand">Notes</a>
    <span class="nav-user">{{.Username}}</span>
    <form method="POST" action="/logout" class="nav-logout">
      <button type="submit">Sign out</button>
    </form>
  </nav>

  <div class="sidebar-overlay" id="sidebar-overlay">
    <div class="sidebar-backdrop" id="sidebar-backdrop"></div>
    <div class="sidebar-panel" id="sidebar-panel">
      <button type="button" class="sidebar-close" id="sidebar-close" aria-label="Close sidebar">&times;</button>
      <div id="tag-sidebar"
           hx-get="/tags"
           hx-trigger="load"
           hx-swap="innerHTML">
        <p class="sidebar-loading">Loading tags…</p>
      </div>
    </div>
  </div>
  {{end}}

  <div class="layout">
    <main class="main-content">
      {{template "content" .}}
    </main>
  </div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  document.querySelectorAll('time[datetime]').forEach(function(el) {
    var d = new Date(el.getAttribute('datetime'));
    if (isNaN(d)) return;
    var fmt = el.dataset.format;
    if (fmt === 'short') {
      el.textContent = d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    } else {
      el.textContent = d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
        + ' at ' + d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
    }
  });
});
document.body.addEventListener('htmx:afterSwap', function() {
  document.querySelectorAll('time[datetime]').forEach(function(el) {
    var d = new Date(el.getAttribute('datetime'));
    if (isNaN(d)) return;
    var fmt = el.dataset.format;
    if (fmt === 'short') {
      el.textContent = d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' });
    } else {
      el.textContent = d.toLocaleDateString(undefined, { year: 'numeric', month: 'short', day: 'numeric' })
        + ' at ' + d.toLocaleTimeString(undefined, { hour: 'numeric', minute: '2-digit' });
    }
  });
});
</script>
</body>
</html>
{{end}}
