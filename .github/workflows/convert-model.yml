name: Convert Embedding Model (PNNX → ncnn)

on:
  workflow_dispatch:
  push:
    tags: ["model-v*"]

permissions:
  contents: write

jobs:
  convert:
    name: Convert all-MiniLM-L6-v2 to ncnn format
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install torch torchvision torchaudio --index-url https://download.pytorch.org/whl/cpu
          # Pin transformers to 4.x: transformers 5.x has a bug in sdpa_mask that breaks
          # torch.jit.trace on BERT models (IndexError on 0-dim tensor shape during tracing).
          pip install "transformers==4.47.1" "sentence-transformers==3.4.1"
          pip install pnnx

      - name: Export all-MiniLM-L6-v2 to TorchScript
        run: |
          python - <<'EOF'
          import torch
          from sentence_transformers import SentenceTransformer

          # Wrap BertModel to return last_hidden_state as a plain tensor.
          # BertModel returns a ModelOutput (dict subclass); torch.jit.trace strict mode
          # rejects dict outputs, so we unwrap to a single tensor here.
          class BertForEmbedding(torch.nn.Module):
              def __init__(self, bert):
                  super().__init__()
                  self.bert = bert

              def forward(self, input_ids, attention_mask, token_type_ids):
                  return self.bert(
                      input_ids=input_ids,
                      attention_mask=attention_mask,
                      token_type_ids=token_type_ids,
                  ).last_hidden_state

          model = SentenceTransformer("sentence-transformers/all-MiniLM-L6-v2")
          model.eval()

          wrapper = BertForEmbedding(model[0].auto_model)
          wrapper.eval()

          dummy_ids   = torch.zeros(1, 128, dtype=torch.long)
          dummy_mask  = torch.ones(1, 128, dtype=torch.long)
          dummy_types = torch.zeros(1, 128, dtype=torch.long)

          with torch.no_grad():
              traced = torch.jit.trace(wrapper, (dummy_ids, dummy_mask, dummy_types))
              torch.jit.save(traced, "bert_minilm.pt")

          print("Exported bert_minilm.pt, output shape:",
                traced(dummy_ids, dummy_mask, dummy_types).shape)
          EOF

      - name: Convert TorchScript to ncnn via PNNX
        run: |
          # Traced model uses torch.long (i64); inputshape must match.
          # Tensor.to layers emitted by pnnx for BERT's internal float/bool
          # casts are handled by the custom passthrough layer in ncnn_bridge.cpp.
          pnnx bert_minilm.pt \
            inputshape="[1,128]i64,[1,128]i64,[1,128]i64" \
            inputname="input_ids,attention_mask,token_type_ids" \
            outputname="output0"
          ls -lh bert_minilm.ncnn.*

      - name: Optimize ncnn model
        run: |
          # ncnnoptimize is bundled with pnnx; fall back to plain copy if absent
          if which ncnnoptimize; then
            ncnnoptimize bert_minilm.ncnn.param bert_minilm.ncnn.bin \
                         model.ncnn.param model.ncnn.bin 0
          else
            cp bert_minilm.ncnn.param model.ncnn.param
            cp bert_minilm.ncnn.bin   model.ncnn.bin
          fi
          ls -lh model.ncnn.*

      - name: Validate output shape and accuracy
        run: |
          python - <<'EOF'
          import struct, math

          # Load the reference embedding from Python HuggingFace
          from sentence_transformers import SentenceTransformer
          import numpy as np
          model = SentenceTransformer("sentence-transformers/all-MiniLM-L6-v2")
          ref = model.encode("hello world", normalize_embeddings=True)

          # We can't easily run ncnn from Python here; just validate file sizes
          import os
          param_size = os.path.getsize("model.ncnn.param")
          bin_size   = os.path.getsize("model.ncnn.bin")
          print(f"model.ncnn.param: {param_size:,} bytes")
          print(f"model.ncnn.bin:   {bin_size:,} bytes")
          assert param_size > 1000,   "param file suspiciously small"
          assert bin_size   > 1000000, "bin file suspiciously small (< 1 MB)"
          print("Size validation passed")

          # Save reference vector for golden test
          with open("reference_embedding.bin", "wb") as f:
              f.write(struct.pack(f"{len(ref)}f", *ref.tolist()))
          print(f"Saved reference embedding ({len(ref)} dims)")
          EOF

      - name: Determine tag name
        id: tag
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=model-v2" >> "$GITHUB_OUTPUT"
          fi

      - name: Create or update GitHub Release and upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.tag.outputs.tag }}"
          # Create release if it doesn't exist
          gh release view "$TAG" || \
            gh release create "$TAG" \
              --title "Embedding model: $TAG" \
              --notes "ncnn-format all-MiniLM-L6-v2 converted via PNNX" \
              --prerelease

          gh release upload "$TAG" model.ncnn.param model.ncnn.bin reference_embedding.bin \
            --clobber

          echo "Uploaded assets to release $TAG"
          gh release view "$TAG" --json assets --jq '.assets[].browserDownloadUrl'
